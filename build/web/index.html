  <!-- mobile_scanner Web: ZXing -->
  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script>
    (function () {
      function isbnBarcodeHints() {
        var m = new Map();
        m.set(2, [7, 6, 14, 15, 4]);
        return m;
      }
      window.hidooDecodeBarcodeFromImageFile = function (file) {
        return new Promise(function (resolve) {
          if (!file || !window.ZXing) {
            resolve(null);
            return;
          }
          var url = URL.createObjectURL(file);
          var img = new Image();
          img.decoding = 'async';
          img.onload = function () {
            URL.revokeObjectURL(url);
            try {
              var reader;
              try {
                reader = new ZXing.BrowserMultiFormatReader(isbnBarcodeHints(), 500);
              } catch (e) {
                reader = new ZXing.BrowserMultiFormatReader();
              }
              reader.decodeFromImageElement(img).then(function (result) {
                try { reader.reset(); } catch (e) {}
                resolve(result && result.text ? result.text : null);
              }).catch(function () {
                try { reader.reset(); } catch (e) {}
                resolve(null);
              });
            } catch (e) {
              resolve(null);
            }
          };
          img.onerror = function () {
            URL.revokeObjectURL(url);
            resolve(null);
          };
          img.src = url;
        });
      };
      window.hidooPickImageFile = function () {
        return new Promise(function (resolve) {
          var input = document.getElementById('isbn-upload');
          if (!input) {
            resolve(null);
            return;
          }
          input.value = '';
          function cleanup() {
            input.removeEventListener('change', onChange);
            input.removeEventListener('cancel', onCancel);
          }
          function onChange() {
            cleanup();
            resolve((input.files && input.files[0]) || null);
          }
          function onCancel() {
            cleanup();
            resolve(null);
          }
          input.addEventListener('change', onChange);
          input.addEventListener('cancel', onCancel);
          input.click();
        });
      };
    })();
  </script>
</head>
<body>
  <input type="file" id="isbn-upload" accept="image/*" hidden aria-hidden="true">
  <script src="flutter_bootstrap.js" async></script>
</body>
